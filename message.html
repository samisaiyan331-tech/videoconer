<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broadcast & Messaging Center | Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #090a0f;
            --card-bg: #121420;
            --primary: #ff2a5f;
            --secondary: #ff7e40;
            --text-main: #ffffff;
            --text-muted: #8a8d9f;
            --gradient: linear-gradient(135deg, var(--primary), var(--secondary));
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text-main); min-height: 100vh; padding: 20px; }
        .admin-container { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 20px; }
        @media(max-width: 900px) { .admin-container { grid-template-columns: 1fr; } }
        
        .panel-card { background: var(--card-bg); border-radius: 20px; padding: 25px; border: 1px solid rgba(255, 255, 255, 0.05); height: fit-content; }
        .panel-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; color: var(--primary); }
        .panel-title i { color: var(--secondary); }
        
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; margin-bottom: 8px; color: var(--text-muted); }
        .form-control { width: 100%; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); padding: 12px; border-radius: 10px; color: white; font-size: 14px; outline: none; }
        .form-control:focus { border-color: var(--primary); }
        textarea.form-control { resize: vertical; min-height: 100px; }
        
        .btn-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); color: var(--text-muted); padding: 10px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px; }
        .tab-btn.active { background: var(--gradient); color: white; border: none; }
        
        /* User List Column */
        .user-list-wrapper { max-height: 400px; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 10px; padding: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .user-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 13px; }
        .user-item:last-child { border: none; }
        .user-name { font-weight: 600; }
        .user-uid { color: var(--secondary); font-family: monospace; }
        
        /* Stats Widget */
        .stat-badge { background: rgba(255, 42, 95, 0.1); border: 1px solid rgba(255, 42, 95, 0.2); color: var(--primary); padding: 4px 10px; border-radius: 15px; font-size: 12px; font-weight: 700; margin-left: auto; }
        
        /* Progress Live Overlay */
        .progress-section { display: none; margin-top: 20px; background: rgba(0,0,0,0.4); border-radius: 12px; padding: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .progress-bar-container { background: rgba(255,255,255,0.1); border-radius: 6px; height: 10px; overflow: hidden; margin: 10px 0; }
        .progress-bar-fill { background: var(--gradient); width: 0%; height: 100%; transition: width 0.1s linear; }
        .live-stats { display: flex; justify-content: space-between; font-size: 13px; font-weight: 600; }
        .live-log { max-height: 120px; overflow-y: auto; font-family: monospace; font-size: 11px; margin-top: 10px; background: #050508; padding: 8px; border-radius: 6px; color: #00ff88; }
        
        .send-btn { width: 100%; background: var(--gradient); border: none; padding: 14px; border-radius: 10px; color: white; font-weight: 700; font-size: 14px; cursor: pointer; box-shadow: var(--shadow-glow); display: flex; align-items: center; justify-content: center; gap: 8px; }
        .copy-btn { background: rgba(255, 255, 255, 0.1); border: none; color: white; padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; margin-top: 10px; }
        .auth-overlay { position: fixed; top:0; left:0; right:0; bottom:0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--card-bg); padding: 30px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); width: 90%; max-width: 360px; text-align: center; }
    </style>
</head>
<body>

    <!-- Security Auth Access Prompt -->
    <div class="auth-overlay" id="authOverlay">
        <div class="auth-card">
            <h3 style="margin-bottom: 15px;">Admin Verification / ভেরিফিকেশন</h3>
            <div class="form-group">
                <input type="password" id="authPin" class="form-control" placeholder="Enter Secret PIN / পিন দিন" style="text-align: center;">
            </div>
            <button class="send-btn" onclick="verifyAdminAccess()">Verify Access</button>
        </div>
    </div>

    <!-- Main Workspace -->
    <div class="admin-container">
        <!-- Message Compose Panel -->
        <div class="panel-card">
            <div class="panel-title">
                <i class="fas fa-paper-plane"></i> Rich Message Composer / বার্তা কম্পোজার
            </div>
            
            <div class="form-group">
                <label>Recipients Selection / প্রাপক নির্বাচন</label>
                <div class="btn-group">
                    <button class="tab-btn active" id="typeGroup" onclick="setRecipientType('group')">Broadcast to All Users</button>
                    <button class="tab-btn" id="typeIndividual" onclick="setRecipientType('individual')">Specific User IDs</button>
                </div>
                <input type="text" id="targetIds" class="form-control" placeholder="For specific users, paste comma-separated IDs (e.g. 7959305431, 1234567)" style="display: none;">
            </div>

            <div class="form-group">
                <label>Message Title * / বার্তার মূল টাইটেল</label>
                <input type="text" id="msgTitle" class="form-control" placeholder="Bold header title of the message" required>
            </div>

            <div class="form-group">
                <label>Details Message / বার্তার বিস্তারিত বিবরণ</label>
                <textarea id="msgBody" class="form-control" placeholder="Enter full details here... (Markdown text is supported)"></textarea>
            </div>

            <div class="form-group">
                <label>Optional Photo Image URL / ইমেজ লিংক (ঐচ্ছিক)</label>
                <input type="url" id="imageUrl" class="form-control" placeholder="Paste direct image .jpg / .png link">
            </div>

            <div style="background: rgba(255,255,255,0.02); padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px dashed rgba(255,255,255,0.05);">
                <span style="font-size: 11px; font-weight: 700; color: var(--secondary); text-transform: uppercase;">Optional Action Button / অতিরিক্ত বাটন লিংক</span>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;">
                    <input type="text" id="btnText" class="form-control" placeholder="Button Label Text">
                    <input type="url" id="btnUrl" class="form-control" placeholder="https://destination-url.com">
                </div>
            </div>

            <button class="send-btn" id="sendActionBtn" onclick="initiateMessagingFlow()">
                <i class="fas fa-share-all"></i> Send Message / বার্তা পাঠান
            </button>

            <!-- Sending Status Tracker Overlay -->
            <div class="progress-section" id="progressSection">
                <div class="live-stats">
                    <span id="progressPercent">Sending progress: 0%</span>
                    <span id="progressCounter">0 / 0 Done</span>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar-fill" id="progressBarFill"></div>
                </div>
                <div class="live-stats" style="color: var(--text-muted); font-size: 12px; margin-top: 5px;">
                    <span style="color: #00ff88;"><i class="fas fa-check-circle"></i> Success: <strong id="successVal">0</strong></span>
                    <span style="color: #ff2a5f;"><i class="fas fa-times-circle"></i> Failed: <strong id="failVal">0</strong></span>
                </div>
                <div class="live-log" id="liveLog">Logs initialization...</div>
            </div>
        </div>

        <!-- User Directory Sidebar -->
        <div class="panel-card">
            <div class="panel-title">
                <i class="fas fa-users-medical"></i> Users Directory / ইউজার ডাটাবেজ
                <span class="stat-badge" id="totalUsersBadge">0 Users</span>
            </div>
            
            <div class="user-list-wrapper" id="usersDirectory">
                <div style="text-align: center; padding: 20px; color: var(--text-muted);">Fetching users directory...</div>
            </div>

            <button class="copy-btn" onclick="copyAllUserIds()">
                <i class="fas fa-copy"></i> Copy Comma-Separated IDs
            </button>
        </div>
    </div>

    <script>
        let usersList = [];
        let recipientMode = 'group'; // 'group' or 'individual'
        let sessionPin = '';

        async function verifyAdminAccess() {
            const pin = document.getElementById('authPin').value.trim();
            if(!pin) return alert('Please enter Access PIN.');
            
            try {
                const res = await fetch('/api/users', {
                    headers: { 'X-Admin-PIN': pin }
                });
                
                if (res.ok) {
                    sessionPin = pin;
                    usersList = await res.json();
                    document.getElementById('authOverlay').style.display = 'none';
                    populateUserDirectory();
                } else {
                    alert('Invalid Admin Access PIN!');
                }
            } catch(e) {
                alert('Connection error: ' + e.message);
            }
        }

        function populateUserDirectory() {
            const container = document.getElementById('usersDirectory');
            document.getElementById('totalUsersBadge').textContent = `${usersList.length} Users`;
            
            if(usersList.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:20px; color:var(--text-muted);">No users found.</div>`;
                return;
            }

            let html = '';
            usersList.forEach(u => {
                html += `
                    <div class="user-item">
                        <div>
                            <div class="user-name">${u.firstName}</div>
                            <div style="font-size:11px; color:var(--text-muted);">@${u.username}</div>
                        </div>
                        <span class="user-uid">${u.chatId}</span>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function setRecipientType(type) {
            recipientMode = type;
            if(type === 'group') {
                document.getElementById('typeGroup').classList.add('active');
                document.getElementById('typeIndividual').classList.remove('active');
                document.getElementById('targetIds').style.display = 'none';
            } else {
                document.getElementById('typeIndividual').classList.add('active');
                document.getElementById('typeGroup').classList.remove('active');
                document.getElementById('targetIds').style.display = 'block';
            }
        }

        function copyAllUserIds() {
            if(usersList.length === 0) return alert('No user IDs to copy.');
            const ids = usersList.map(u => u.chatId).join(', ');
            navigator.clipboard.writeText(ids);
            alert('Copied ' + usersList.length + ' IDs to clipboard!');
        }

        // Live chunk-by-chunk client controlled delivery logic (100% Success rate without Worker Execution Timeout)
        async function initiateMessagingFlow() {
            const title = document.getElementById('msgTitle').value.trim();
            const body = document.getElementById('msgBody').value.trim();
            const image = document.getElementById('imageUrl').value.trim();
            const btnT = document.getElementById('btnText').value.trim();
            const btnU = document.getElementById('btnUrl').value.trim();

            if(!title) return alert('Message Title is required.');

            let targetAudience = [];
            if(recipientMode === 'group') {
                targetAudience = usersList.map(u => u.chatId);
            } else {
                const manualVal = document.getElementById('targetIds').value.trim();
                if(!manualVal) return alert('Please input at least one specific User ID.');
                targetAudience = manualVal.split(',').map(id => id.trim()).filter(id => id.length > 0);
            }

            if(targetAudience.length === 0) return alert('Target audience is empty.');

            // Setup Tracker Progress UI
            const progressSection = document.getElementById('progressSection');
            const fill = document.getElementById('progressBarFill');
            const percentText = document.getElementById('progressPercent');
            const counterText = document.getElementById('progressCounter');
            const successEl = document.getElementById('successVal');
            const failEl = document.getElementById('failVal');
            const logBox = document.getElementById('liveLog');

            progressSection.style.display = 'block';
            logBox.innerHTML = 'Broadcasting sequence starting...';
            document.getElementById('sendActionBtn').disabled = true;

            let successCount = 0;
            let failCount = 0;
            const total = targetAudience.length;

            for(let i = 0; i < total; i++) {
                const targetId = targetAudience[i];
                logBox.innerHTML += `<br>Sending to ${targetId}...`;
                logBox.scrollTop = logBox.scrollHeight;

                const payload = {
                    targetId: targetId,
                    title: title,
                    body: body,
                    image: image,
                    btnText: btnT,
                    btnUrl: btnU
                };

                try {
                    const res = await fetch('/api/send-direct', {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'X-Admin-PIN': sessionPin
                        },
                        body: JSON.stringify(payload)
                    });

                    const resData = await res.json();
                    if(res.ok && resData.success) {
                        successCount++;
                        logBox.innerHTML += ` <span style="color:#00ff88;">[OK]</span>`;
                    } else {
                        failCount++;
                        logBox.innerHTML += ` <span style="color:#ff2a5f;">[Failed: ${resData.error || 'Unknown'}]</span>`;
                    }
                } catch(err) {
                    failCount++;
                    logBox.innerHTML += ` <span style="color:#ff2a5f;">[Network Error]</span>`;
                }

                // Update Progress dynamically
                const pct = Math.round(((i + 1) / total) * 100);
                fill.style.width = `${pct}%`;
                percentText.textContent = `Sending progress: ${pct}%`;
                counterText.textContent = `${i + 1} / ${total} Finished`;
                successEl.textContent = successCount;
                failEl.textContent = failCount;
                logBox.scrollTop = logBox.scrollHeight;

                // Simple millisecond timeout throttling
                await new Promise(r => setTimeout(r, 80));
            }

            logBox.innerHTML += `<br><strong>All Processes Finished! Success: ${successCount}, Fail: ${failCount}</strong>`;
            document.getElementById('sendActionBtn').disabled = false;
        }
    </script>
</body>
</html>
