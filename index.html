<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pron Hub BD</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src='//libtl.com/sdk.js' data-zone='10518940' data-sdk='show_10518940'></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #FF3366;
            --secondary: #FF668F;
            --dark-bg: #09090C;
            --card-bg: #15151E;
            --text-light: #F3F4F6;
            --text-muted: #9CA3AF;
            --shadow: 0 8px 24px rgba(255, 51, 102, 0.2);
            --gradient: linear-gradient(135deg, var(--primary), var(--secondary));
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background-color: var(--dark-bg);
            color: var(--text-light);
            min-height: 100vh;
            padding-bottom: 80px;
            overflow-x: hidden;
        }
        
        .container {
            padding: 15px;
            max-width: 100%;
        }
        
        .header {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 22px;
            font-weight: 700;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* Ticker Notification Style */
        .fancy-news-bar {
            display: flex;
            align-items: center;
            background: rgba(255, 51, 102, 0.1);
            border: 1px solid rgba(255, 51, 102, 0.25);
            border-radius: 12px;
            padding: 8px 12px;
            overflow: hidden;
        }

        .fancy-icon {
            font-size: 18px;
            margin-right: 10px;
            color: #fdd835;
            animation: bounce 2s infinite alternate;
        }

        .fancy-text {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .fancy-ticker span {
            display: inline-block;
            white-space: nowrap;
            padding-left: 100%;
            animation: scrollText 35s linear infinite;
            font-size: 13px;
            font-weight: 500;
        }

        .highlight { color: #00e676; }
        .highlight2 { color: #29b6f6; }

        @keyframes scrollText {
            0% { transform: translateX(0%); }
            100% { transform: translateX(-100%); }
        }

        @keyframes bounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(-3px); }
        }
        
        /* 2 Column Tall/Portrait Layout */
        .post-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        
        .post-card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
        }

        .post-card:active {
            transform: scale(0.97);
        }
        
        .thumbnail-container {
            position: relative;
            width: 100%;
            /* 3:4 portrait ratio aspect-ratio */
            aspect-ratio: 3 / 4.2;
            overflow: hidden;
            background: #1e1e24;
        }
        
        .post-thumbnail {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        
        .watch-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
            padding: 12px;
            display: flex;
            justify-content: center;
        }
        
        .watch-btn {
            background: var(--gradient);
            color: white;
            border: none;
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow: var(--shadow);
        }
        
        /* Highlighted Pagination Controls */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 30px 0 10px;
            gap: 15px;
        }
        
        .page-btn {
            background: var(--gradient);
            border: none;
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: opacity 0.2s;
        }
        
        .page-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            box-shadow: none;
        }
        
        .page-info {
            font-weight: 600;
            font-size: 15px;
            color: var(--text-light);
            background: var(--card-bg);
            padding: 10px 18px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        /* Custom Video Container and Player */
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: black;
            z-index: 100;
            display: none;
            flex-direction: column;
            justify-content: center;
        }
        
        .video-player {
            width: 100%;
            max-height: 100%;
        }
        
        .player-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 15px;
            display: flex;
            align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            z-index: 10;
        }
        
        .back-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            color: white;
            font-size: 16px;
            cursor: pointer;
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .player-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px 15px;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            display: flex;
            flex-direction: column;
            z-index: 10;
            transition: opacity 0.3s;
        }
        
        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.25);
            border-radius: 5px;
            margin-bottom: 15px;
            cursor: pointer;
            position: relative;
        }
        
        .progress-bar {
            height: 100%;
            background: var(--primary);
            border-radius: 5px;
            width: 0%;
        }
        
        .control-buttons {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .control-btn {
            background: transparent;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .time-display {
            color: white;
            font-size: 13px;
        }
        
        /* 10-Second CountDown Overlay */
        .replay-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 15;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .replay-box {
            background: var(--card-bg);
            border: 2px solid var(--primary);
            border-radius: 20px;
            padding: 25px;
            max-width: 90%;
            width: 320px;
            box-shadow: var(--shadow);
        }

        .countdown-circle {
            position: relative;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px dashed var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            animation: spin 10s linear;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        .countdown-num {
            position: absolute;
            transform: rotate(-360deg); /* Counter spin so number stays upright */
            font-size: 22px;
            font-weight: 700;
        }

        .replay-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .replay-subtitle {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .replay-btn {
            background: var(--gradient);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: var(--shadow);
        }

        .replay-close-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: var(--text-light);
            padding: 10px 24px;
            border-radius: 12px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        
        /* Bottom Navigation Bar */
        .navigation {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card-bg);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
            z-index: 50;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .nav-btn {
            background: transparent;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 11px;
            font-weight: 500;
            transition: color 0.3s, transform 0.3s;
        }
        
        .nav-btn i {
            font-size: 20px;
            margin-bottom: 4px;
        }
        
        .nav-btn.active {
            color: var(--primary);
            transform: translateY(-2px);
        }
        
        /* Ad Loader Layout */
        .ad-counter {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(9, 9, 12, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            display: none;
            padding: 20px;
        }
        
        .ad-counter-text {
            color: white;
            font-size: 20px;
            margin-bottom: 25px;
            text-align: center;
            font-weight: 600;
            line-height: 1.4;
        }
        
        .ad-progress {
            width: 80%;
            max-width: 300px;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 5px;
            margin-bottom: 25px;
            overflow: hidden;
        }
        
        .ad-progress-bar {
            height: 100%;
            background: var(--gradient);
            width: 0%;
        }
        
        .ad-skip {
            color: white;
            background: var(--gradient);
            border: none;
            padding: 12px 35px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            display: none;
            box-shadow: var(--shadow);
        }
        
        /* Watchlist styles */
        .watchlist-container {
            padding: 10px;
        }
        
        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--primary);
        }
        
        .watchlist-date {
            font-size: 13px;
            color: var(--text-muted);
            margin: 20px 0 10px;
            padding-left: 10px;
            border-left: 3px solid var(--primary);
            font-weight: 600;
        }
        
        .watchlist-item {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .watchlist-thumbnail {
            width: 50px;
            height: 65px;
            border-radius: 8px;
            object-fit: cover;
            margin-right: 15px;
        }
        
        .watchlist-info {
            flex: 1;
        }
        
        .watchlist-item-title {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }
        
        .watchlist-item-time {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* Rules styles */
        .rules-container {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255, 51, 102, 0.2);
            position: relative;
        }
        
        .rules-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--primary);
        }
        
        .rules-list {
            list-style: none;
            margin-bottom: 20px;
        }
        
        .rules-list li {
            margin-bottom: 12px;
            padding-left: 20px;
            position: relative;
            font-size: 13px;
            line-height: 1.6;
            color: var(--text-light);
        }
        
        .rules-list li::before {
            content: '•';
            color: var(--primary);
            font-size: 20px;
            position: absolute;
            left: 0;
            top: -2px;
        }

        .important-note {
            background: rgba(255, 51, 102, 0.1);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid var(--primary);
            font-size: 13px;
            line-height: 1.5;
        }
        
        .rules-btn {
            position: fixed;
            bottom: 90px;
            right: 15px;
            background: var(--gradient);
            color: white;
            border: none;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            box-shadow: var(--shadow);
            z-index: 40;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .rules-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: transparent;
            border: none;
            color: var(--primary);
            font-size: 20px;
            cursor: pointer;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }
        
        .empty-icon {
            font-size: 50px;
            color: rgba(255, 255, 255, 0.1);
            margin-bottom: 15px;
        }
        
        .empty-text {
            color: var(--text-muted);
            font-size: 14px;
        }

        /* Welcome page */
        .welcome-container {
            padding: 25px 20px;
            text-align: center;
        }

        .welcome-title {
            font-size: 24px;
            margin: 15px 0;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        .welcome-desc {
            color: var(--text-muted);
            font-size: 13px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .welcome-btn {
            background: var(--gradient);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            box-shadow: var(--shadow);
        }
        
        .video-container.hide-controls .player-header,
        .video-container.hide-controls .player-controls {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="container" id="app-container"></div>
    
    <!-- Video Player Screen -->
    <div class="video-container" id="video-container">
        <div class="player-header">
            <button class="back-btn" id="back-btn"><i class="fas fa-arrow-left"></i></button>
        </div>
        <video class="video-player" id="video-player" playsinline></video>
        
        <!-- Replay Overlay with 10s Countdown -->
        <div class="replay-overlay" id="replay-overlay">
            <div class="replay-box">
                <div class="countdown-circle">
                    <span class="countdown-num" id="countdown-num">10</span>
                </div>
                <div class="replay-title">পুনরায় দেখতে চান? / Replay Video?</div>
                <div class="replay-subtitle">
                    ১০ সেকেন্ডের মধ্যে নিচের বাটনে ক্লিক করে ১টি শর্ট বিজ্ঞাপন দেখে ভিডিওটি আবার দেখতে পারবেন।
                </div>
                <button class="replay-btn" id="replay-action-btn">
                    <i class="fas fa-redo"></i> ১টি বিজ্ঞাপনে পুনরায় প্লে করুন
                </button>
                <button class="replay-close-btn" id="replay-close-btn">হোমপেজে ফিরে যান</button>
            </div>
        </div>

        <div class="player-controls">
            <div class="progress-container" id="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <div class="control-buttons">
                <button class="control-btn" id="play-pause-btn"><i class="fas fa-pause"></i></button>
                <div class="time-display" id="time-display">0:00 / 0:00</div>
                <button class="control-btn" id="fullscreen-btn"><i class="fas fa-expand"></i></button>
            </div>
        </div>
    </div>
    
    <!-- Fake Ad Interval Screen -->
    <div class="ad-counter" id="ad-counter">
        <div class="ad-counter-text">বিজ্ঞাপন লোড হচ্ছে... অনুগ্রহ করে অপেক্ষা করুন<br><span id="ad-count-text" style="color: var(--primary); font-size: 16px;">বিজ্ঞাপন ১ অফ ২</span></div>
        <div class="ad-progress">
            <div class="ad-progress-bar" id="ad-progress-bar"></div>
        </div>
        <button class="ad-skip" id="ad-skip-btn">কন্টিনিউ করুন (<span id="skip-timer">5</span>s)</button>
    </div>
    
    <button class="rules-btn" id="rules-btn"><i class="fas fa-info"></i></button>
    
    <!-- Navigation -->
    <div class="navigation">
        <button class="nav-btn active" id="home-btn">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </button>
        <button class="nav-btn" id="watchlist-btn">
            <i class="fas fa-history"></i>
            <span>Watchlist</span>
        </button>
    </div>
    
    <script src="content.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();
        
        let currentPage = 1;
        let currentView = 'home';
        let watchedVideos = JSON.parse(localStorage.getItem('watchedVideos')) || {};
        let totalAdsCount = 0; 
        let requiredAds = 2; // Default 2 ads for first watch
        let currentVideoId = null;
        let adInterval;
        let secondsLeft = 5;
        let controlsTimeout;
        let isControlsVisible = true;
        let replayTimerInterval;
        let replaySecondsLeft = 10;
        
        const appContainer = document.getElementById('app-container');
        const homeBtn = document.getElementById('home-btn');
        const watchlistBtn = document.getElementById('watchlist-btn');
        const videoContainer = document.getElementById('video-container');
        const videoPlayer = document.getElementById('video-player');
        const backBtn = document.getElementById('back-btn');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const progressBar = document.getElementById('progress-bar');
        const progressContainer = document.getElementById('progress-container');
        const timeDisplay = document.getElementById('time-display');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const adCounter = document.getElementById('ad-counter');
        const adCountText = document.getElementById('ad-count-text');
        const adProgressBar = document.getElementById('ad-progress-bar');
        const adSkipBtn = document.getElementById('ad-skip-btn');
        const skipTimerDisplay = document.getElementById('skip-timer');
        const rulesBtn = document.getElementById('rules-btn');

        const replayOverlay = document.getElementById('replay-overlay');
        const countdownNum = document.getElementById('countdown-num');
        const replayActionBtn = document.getElementById('replay-action-btn');
        const replayCloseBtn = document.getElementById('replay-close-btn');
        
        initApp();
        
        function initApp() {
            if (!localStorage.getItem('welcomeShown')) {
                showWelcomeMessage();
                localStorage.setItem('welcomeShown', 'true');
            } else {
                loadHomePage();
            }
            setupEventListeners();
        }
        
        function setupEventListeners() {
            homeBtn.addEventListener('click', () => {
                currentView = 'home';
                homeBtn.classList.add('active');
                watchlistBtn.classList.remove('active');
                loadHomePage();
            });
            
            watchlistBtn.addEventListener('click', () => {
                currentView = 'watchlist';
                watchlistBtn.classList.add('active');
                homeBtn.classList.remove('active');
                loadWatchlist();
            });
            
            backBtn.addEventListener('click', closePlayer);
            
            playPauseBtn.addEventListener('click', () => {
                if (videoPlayer.paused) {
                    videoPlayer.play();
                } else {
                    videoPlayer.pause();
                }
                resetControlsTimeout();
            });
            
            progressContainer.addEventListener('click', (e) => {
                const rect = progressContainer.getBoundingClientRect();
                const pos = (e.clientX - rect.left) / rect.width;
                videoPlayer.currentTime = pos * videoPlayer.duration;
                resetControlsTimeout();
            });
            
            fullscreenBtn.addEventListener('click', () => {
                if (videoContainer.requestFullscreen) videoContainer.requestFullscreen();
                else if (videoContainer.webkitRequestFullscreen) videoContainer.webkitRequestFullscreen();
                resetControlsTimeout();
            });
            
            videoPlayer.addEventListener('play', () => {
                playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
            });
            
            videoPlayer.addEventListener('pause', () => {
                playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
            });
            
            videoPlayer.addEventListener('timeupdate', () => {
                const percent = (videoPlayer.currentTime / videoPlayer.duration) * 100;
                progressBar.style.width = `${percent}%`;
                timeDisplay.textContent = `${formatTime(videoPlayer.currentTime)} / ${formatTime(videoPlayer.duration)}`;
            });
            
            videoPlayer.addEventListener('ended', showReplayCountdown);
            
            videoContainer.addEventListener('mousemove', () => {
                showControls();
                resetControlsTimeout();
            });
            
            videoContainer.addEventListener('touchstart', () => {
                showControls();
                resetControlsTimeout();
            });
            
            rulesBtn.addEventListener('click', showRules);

            // Replay actions
            replayCloseBtn.addEventListener('click', () => {
                clearInterval(replayTimerInterval);
                closePlayer();
            });

            replayActionBtn.addEventListener('click', () => {
                clearInterval(replayTimerInterval);
                replayOverlay.style.display = 'none';
                requiredAds = 1; // 1 ad to replay
                totalAdsCount = 1;
                showAd();
            });
            
            adSkipBtn.addEventListener('click', () => {
                if (secondsLeft <= 0) {
                    clearInterval(adInterval);
                    adCounter.style.display = 'none';
                    
                    // Trigger Monetag Ads
                    show_10518940().then(() => {
                        handleAdComplete();
                    }).catch(() => {
                        handleAdComplete(); // Fallback play
                    });
                }
            });
        }

        function handleAdComplete() {
            if (totalAdsCount < requiredAds) {
                totalAdsCount++;
                showAd();
            } else {
                playVideo(currentVideoId);
            }
        }
        
        function showControls() {
            videoContainer.classList.remove('hide-controls');
            isControlsVisible = true;
        }
        
        function hideControls() {
            videoContainer.classList.add('hide-controls');
            isControlsVisible = false;
        }
        
        function resetControlsTimeout() {
            clearTimeout(controlsTimeout);
            showControls();
            controlsTimeout = setTimeout(hideControls, 4000);
        }
        
        function showWelcomeMessage() {
            appContainer.innerHTML = `
                <div class="welcome-container">
                    <div style="font-size: 55px; margin-bottom: 10px;">👋</div>
                    <h1 class="welcome-title">Welcome to Pron Hub BD</h1>
                    <p class="welcome-desc">
                        আমাদের উচ্চমানের পোর্ট্রেট ভিডিওসমূহ উপভোগ করতে এবং নিয়মিত আপডেট পেতে মিনি অ্যাপে জয়েন করুন।
                    </p>
                    <button class="welcome-btn" onclick="loadHomePage()">শুরু করুন / Get Started</button>
                </div>
            `;
        }
        
        function showRules() {
            appContainer.innerHTML = `
                <div class="rules-container">
                    <button class="rules-close" id="rules-close-btn"><i class="fas fa-times"></i></button>
                    <h2 class="rules-title">নির্দেশনা ও নিয়মাবলি / Rules</h2>
                    
                    <div class="important-note">
                        <strong>জরুরি সতর্কতা:</strong> বিজ্ঞাপন এড়িয়ে বা কেটে গেলে ভিডিও প্লে হবে না। প্রতিটি বিজ্ঞাপনের শেষে অবশই কন্টিনিউ করতে হবে।
                    </div>
                    
                    <ul class="rules-list">
                        <li>একটি নতুন ভিডিও প্লে করতে আপনাকে ২টি বিজ্ঞাপন অতিক্রম করতে হবে।</li>
                        <li>পূর্বে দেখা যেকোনো ভিডিও পুনরায় ১টি বিজ্ঞাপন দেখে ওয়াচলিস্ট থেকে প্লে করতে পারেন।</li>
                        <li>ভিডিওর শেষে ১০ সেকেন্ড সময় থাকবে, আপনি চাইলে ১টি বিজ্ঞাপন দেখে সাথে সাথেই ভিডিওটি পুনরায় প্লে করতে পারেন।</li>
                        <li>সফলভাবে বিজ্ঞাপন দেখার পর ভিডিও স্বয়ংক্রিয়ভাবে আরম্ভ হবে।</li>
                    </ul>
                </div>
            `;
            document.getElementById('rules-close-btn').addEventListener('click', () => {
                if (currentView === 'home') loadHomePage();
                else loadWatchlist();
            });
        }
        
        function loadHomePage() {
            const availablePosts = posts.filter(post => !watchedVideos[post.id]);
            const postsPerPage = 10;
            const totalPages = Math.ceil(availablePosts.length / postsPerPage) || 1;
            
            if (currentPage > totalPages) currentPage = totalPages;
            const startIndex = (currentPage - 1) * postsPerPage;
            const pagePosts = availablePosts.slice(startIndex, startIndex + postsPerPage);
            
            let html = `
                <div class="header">
                    <div class="header-top">
                        <div class="logo">Pron Hub BD</div>
                    </div>
                    <div class="fancy-news-bar">
                        <div class="fancy-icon">📢</div>
                        <div class="fancy-text">
                            <div class="fancy-ticker">
                                <span>
                                    <strong>👋 স্বাগতম!</strong> ভিডিও দেখতে যথাক্রমে ২টি বিজ্ঞাপন সম্পন্ন করতে হবে। &nbsp;&nbsp;&nbsp;
                                    <strong class="highlight">🔄 ভিডিও শেষে রি-প্লে অপশন পাবেন।</strong> &nbsp;&nbsp;&nbsp;
                                    <strong>🏠 সম্পন্ন হবার পর পুনরায় হোমপেজে ফিরবে।</strong>
                                </span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            if (pagePosts.length === 0) {
                html += `
                    <div class="empty-state">
                        <div class="empty-icon"><i class="far fa-folder-open"></i></div>
                        <div class="empty-text">সমস্ত উপলব্ধ ভিডিও দেখা শেষ! ওয়াচলিস্ট চেক করুন।</div>
                    </div>
                `;
            } else {
                html += '<div class="post-grid">';
                pagePosts.forEach(post => {
                    html += `
                        <div class="post-card">
                            <div class="thumbnail-container">
                                <img src="${post.thumbnail}" class="post-thumbnail" alt="Thumb">
                                <div class="watch-overlay">
                                    <button class="watch-btn" onclick="triggerWatchFlow('${post.id}', 2)">
                                        <i class="fas fa-play"></i> প্লে করুন
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                });
                html += '</div>';
                
                html += `
                    <div class="pagination">
                        <button class="page-btn" onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>
                            <i class="fas fa-chevron-left"></i> পূর্ববর্তী
                        </button>
                        <span class="page-info">Page ${currentPage} / ${totalPages}</span>
                        <button class="page-btn" onclick="changePage(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''}>
                            পরবর্তী <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>
                `;
            }
            
            appContainer.innerHTML = html;
        }
        
        function loadWatchlist() {
            let html = `
                <div class="watchlist-container">
                    <div class="section-title">
                        <i class="fas fa-history"></i>
                        পূর্বে দেখা ভিডিওসমূহ (Watchlist)
                    </div>
            `;
            
            const watchIds = Object.keys(watchedVideos);
            if (watchIds.length === 0) {
                html += `
                    <div class="empty-state">
                        <div class="empty-icon"><i class="far fa-clock"></i></div>
                        <div class="empty-text">আপনি এখনও কোনো ভিডিও দেখেননি।</div>
                    </div>
                `;
            } else {
                const list = [];
                watchIds.forEach(id => {
                    const post = posts.find(p => p.id === id);
                    if (post) {
                        list.push({ post, timestamp: watchedVideos[id] });
                    }
                });
                
                list.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                
                list.forEach(item => {
                    const dateStr = new Date(item.timestamp).toLocaleDateString();
                    html += `
                        <div class="watchlist-item" onclick="triggerWatchFlow('${item.post.id}', 1)">
                            <img src="${item.post.thumbnail}" class="watchlist-thumbnail" alt="Thumb">
                            <div class="watchlist-info">
                                <div class="watchlist-item-title">কন্টেন্ট আইডি: #${item.post.id}</div>
                                <div class="watchlist-item-time">সংরক্ষণ: ${dateStr}</div>
                            </div>
                            <i class="fas fa-play" style="color: var(--primary); font-size: 16px;"></i>
                        </div>
                    `;
                });
            }
            html += '</div>';
            appContainer.innerHTML = html;
        }
        
        function changePage(newPage) {
            currentPage = newPage;
            loadHomePage();
            window.scrollTo(0, 0);
        }
        
        function triggerWatchFlow(postId, adsRequired) {
            currentVideoId = postId;
            requiredAds = adsRequired;
            totalAdsCount = 1;
            showAd();
        }
        
        function showAd() {
            secondsLeft = 5;
            skipTimerDisplay.textContent = secondsLeft;
            adSkipBtn.style.display = 'none';
            adCounter.style.display = 'flex';
            adCountText.textContent = `বিজ্ঞাপন ${totalAdsCount} অফ ${requiredAds}`;
            adProgressBar.style.width = '0%';
            
            let progress = 0;
            adInterval = setInterval(() => {
                progress += 2;
                adProgressBar.style.width = `${progress}%`;
                
                if (progress % 20 === 0 && secondsLeft > 0) {
                    secondsLeft--;
                    skipTimerDisplay.textContent = secondsLeft;
                }
                
                if (progress >= 100) {
                    clearInterval(adInterval);
                    adSkipBtn.style.display = 'block';
                }
            }, 100);
        }
        
        function playVideo(postId) {
            const post = posts.find(p => p.id === postId);
            if (!post) return;
            
            watchedVideos[postId] = new Date().toISOString();
            localStorage.setItem('watchedVideos', JSON.stringify(watchedVideos));
            
            videoContainer.style.display = 'flex';
            replayOverlay.style.display = 'none';
            videoPlayer.src = post.videoLink;
            videoPlayer.load();
            
            showControls();
            resetControlsTimeout();
            
            videoPlayer.play().catch(e => {
                console.log('Autoplay standard blocked, waiting interact');
            });
        }

        function showReplayCountdown() {
            replaySecondsLeft = 10;
            countdownNum.textContent = replaySecondsLeft;
            replayOverlay.style.display = 'flex';
            
            replayTimerInterval = setInterval(() => {
                replaySecondsLeft--;
                countdownNum.textContent = replaySecondsLeft;
                
                if (replaySecondsLeft <= 0) {
                    clearInterval(replayTimerInterval);
                    closePlayer();
                }
            }, 1000);
        }

        function closePlayer() {
            videoPlayer.pause();
            videoContainer.style.display = 'none';
            replayOverlay.style.display = 'none';
            clearInterval(replayTimerInterval);
            
            if (currentView === 'home') loadHomePage();
            else loadWatchlist();
        }
        
        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }
        
        window.triggerWatchFlow = triggerWatchFlow;
        window.changePage = changePage;
        window.loadHomePage = loadHomePage;
    </script>
</body>
</html>
